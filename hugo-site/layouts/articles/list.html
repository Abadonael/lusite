{{ define "main" }}

<main class="articles-page container">
  <section class="articles-intro">
    <h1>Articles</h1>
    <p>Medical articles and publications.</p>
  </section>

  <section class="articles-list">
    <div class="article-grid">
      {{ range .Pages }}
        <a class="article-card" href="{{ .RelPermalink }}">
          <div class="article-card-header">
            <h3>{{ .Title }}</h3>
            <span>›</span>
          </div>
          <p>{{ .Summary }}</p>
          <div class="article-date">{{ .Date.Format "January 2, 2006" }}</div>
        </a>
      {{ end }}
    </div>
  </section>
</main>

{{ end }}
